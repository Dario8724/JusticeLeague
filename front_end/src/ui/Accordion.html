<div class="accordion w-full space-y-2">
  <div class="accordion-item border-b border-border" data-state="closed">
    <button type="button" class="accordion-trigger flex flex-1 items-center justify-between w-full py-4 font-medium transition-all hover:underline" onclick="toggleAccordion(this)">
      <span>Pergunta ou Título do Item</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-content">
      <div class="pb-4 pt-0 text-sm text-muted-foreground">
        Este é o conteúdo do accordion. Podes colocar aqui qualquer texto ou informação adicional.
      </div>
    </div>
  </div>
  <div class="accordion-item border-b border-border" data-state="closed">
    <button type="button" class="accordion-trigger flex flex-1 items-center justify-between w-full py-4 font-medium transition-all hover:underline" onclick="toggleAccordion(this)">
      <span>Outro Item do Accordion</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-content">
      <div class="pb-4 pt-0 text-sm text-muted-foreground">
        Mais conteúdo detalhado aqui para demonstrar a funcionalidade de colapso.
      </div>
    </div>
  </div>
</div>
