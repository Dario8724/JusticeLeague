<div class="p-12 flex justify-center">
  <button type="button" class="bg-primary text-primary-foreground px-4 py-2 rounded-md font-bold" onclick="openAlertDialog('example')">Abrir Dialog</button>
  <div id="example-overlay" class="alert-dialog-overlay" onclick="closeAlertDialog('example')"></div>
  <div id="example-content" class="alert-dialog-content">
    <div class="flex flex-col space-y-2 text-center sm:text-left">
      <h2 class="text-lg font-semibold">Tens a certeza absoluta?</h2>
      <p class="text-sm text-muted-foreground">Esta ação não pode ser desfeita. Isto irá apagar permanentemente a tua conta e remover os teus dados dos nossos servidores.</p>
    </div>
    <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2">
      <button class="mt-2 sm:mt-0 border border-input bg-background hover:bg-accent hover:text-accent-foreground px-4 py-2 rounded-md text-sm font-medium transition-colors" onclick="closeAlertDialog('example')">Cancelar</button>
      <button class="bg-primary text-primary-foreground hover:bg-primary/90 px-4 py-2 rounded-md text-sm font-medium transition-colors" onclick="closeAlertDialog('example')">Continuar</button>
    </div>
  </div>
</div>
