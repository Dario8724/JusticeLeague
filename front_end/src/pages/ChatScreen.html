<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat de Apoio - SafeNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>

<body class="min-h-screen pt-20 pb-8 flex flex-col items-center">
  <header id="main-navbar"
    class="fixed top-0 left-0 right-0 z-50 glass border-b border-border/50 bg-white/80 backdrop-blur-md">
    <div class="container mx-auto px-4 flex items-center justify-between h-16">
      <a href="HomeScreen.html" class="flex items-center gap-2.5 group">
        <div
          class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center shadow-md shadow-primary/25 group-active:scale-95 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="text-primary-foreground">
            <path
              d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
          </svg>
        </div>
        <span class="text-lg font-extrabold tracking-tight">Safe<span class="gradient-text">Net</span></span>
      </a>
      <nav class="hidden md:flex items-center gap-1">
        <a href="HomeScreen.html"
          class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Início</a>
        <a href="ChatScreen.html"
          class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Chat
          de Apoio</a>
        <a href="ResourcesScreen.html"
          class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Recursos</a>
        <a href="ReportScreen.html"
          class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Denúncia</a>
      </nav>
      <div class="hidden md:flex items-center gap-3">
        <a href="ChatScreen.html"
          class="bg-primary text-primary-foreground px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all duration-200">Pedir
          Ajuda</a>
      </div>
      <button id="mobile-toggle"
        class="md:hidden p-2 rounded-lg hover:bg-muted active:scale-95 transition-transform text-foreground">
        <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
        <svg id="close-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div id="mobile-menu"
      class="hidden md:hidden border-t border-border/50 bg-white/95 backdrop-blur-md animate-fade-in">
      <div class="container mx-auto px-4 py-4 space-y-1">
        <a href="HomeScreen.html"
          class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Início</a>
        <a href="ChatScreen.html"
          class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Chat
          de Apoio</a>
        <a href="ResourcesScreen.html"
          class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Recursos</a>
        <a href="ReportScreen.html"
          class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Denúncia</a>
        <a href="ChatScreen.html"
          class="block w-full bg-primary text-primary-foreground text-center px-4 py-3 rounded-xl text-sm font-bold mt-2">Pedir
          Ajuda</a>
      </div>
    </div>
  </header>
  <a href="HomeScreen.html"
    class="absolute top-24 left-6 text-muted-foreground hover:text-foreground transition-colors flex items-center gap-2 text-sm font-medium hover:bg-black/5 p-2 rounded-lg cursor-pointer z-10">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m15 18-6-6 6-6" />
    </svg>
    Voltar
  </a>
  <div class="container max-w-3xl w-full px-4 mt-8">
    <div class="mb-6 animate-fade-up">
      <h1 class="text-2xl md:text-3xl font-black tracking-tight">Chat de Apoio</h1>
      <p class="text-muted-foreground text-sm mt-1">Conversa confidencial e segura 🔒</p>
    </div>
    <div class="bg-card border border-border/60 rounded-3xl shadow-sm overflow-hidden animate-fade-up"
      style="animation-delay: 100ms;">
      <div id="messagesContainer" class="h-[60vh] overflow-y-auto px-5 md:px-8 py-6 space-y-4"></div>
      <div class="border-t border-border/60 px-5 md:px-8 py-4 bg-muted/30">
        <div class="flex gap-3">
          <input id="chatInput" type="text" placeholder="Escreve a tua mensagem..."
            class="flex-1 bg-card border border-border rounded-xl px-5 py-3 text-sm outline-none focus:ring-2 focus:ring-ring/50 transition-shadow" />
          <button id="sendButton" disabled
            class="bg-primary text-primary-foreground rounded-xl p-3 active:scale-95 transition-all duration-150 shadow-md shadow-primary/20 disabled:opacity-40 disabled:pointer-events-none hover:shadow-lg flex items-center justify-center shrink-0"
            style="width: 46px; height: 46px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m22 2-7 20-4-9-9-4Z" />
              <path d="M22 2 11 13" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>

</html>
