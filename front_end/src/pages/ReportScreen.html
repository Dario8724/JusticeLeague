<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportar Situação - SafeNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>
<body class="min-h-screen pt-20 pb-16">
  <header id="main-navbar" class="fixed top-0 left-0 right-0 z-50 glass border-b border-border/50 bg-white/80 backdrop-blur-md">
    <div class="container mx-auto px-4 flex items-center justify-between h-16">
      <a href="HomeScreen.html" class="flex items-center gap-2.5 group">
        <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center shadow-md shadow-primary/25 group-active:scale-95 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary-foreground"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        </div>
        <span class="text-lg font-extrabold tracking-tight">Safe<span class="gradient-text">Net</span></span>
      </a>
      <nav class="hidden md:flex items-center gap-1">
        <a href="HomeScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Início</a>
        <a href="ChatScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Chat de Apoio</a>
        <a href="ResourcesScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Recursos</a>
        <a href="ReportScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">Denúncia</a>
      </nav>
      <div class="hidden md:flex items-center gap-3">
        <a href="ChatScreen.html" class="bg-primary text-primary-foreground px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all duration-200">Pedir Ajuda</a>
      </div>
      <button id="mobile-toggle" class="md:hidden p-2 rounded-lg hover:bg-muted active:scale-95 transition-transform text-foreground">
        <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg id="close-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden border-t border-border/50 bg-white/95 backdrop-blur-md animate-fade-in">
      <div class="container mx-auto px-4 py-4 space-y-1">
        <a href="HomeScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Início</a>
        <a href="ChatScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Chat de Apoio</a>
        <a href="ResourcesScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Recursos</a>
        <a href="ReportScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">Denúncia</a>
        <a href="ChatScreen.html" class="block w-full bg-primary text-primary-foreground text-center px-4 py-3 rounded-xl text-sm font-bold mt-2">Pedir Ajuda</a>
      </div>
    </div>
  </header>
  <a href="HomeScreen.html" class="absolute top-24 left-6 text-muted-foreground hover:text-foreground transition-colors flex items-center gap-2 text-sm font-medium hover:bg-black/5 p-2 rounded-lg cursor-pointer z-10">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Voltar
  </a>
  <div class="container mx-auto max-w-2xl px-4 mt-8">
    <div class="animate-fade-up mb-8">
      <p class="text-primary font-bold text-sm tracking-wide uppercase mb-2">Denúncia</p>
      <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-3">Reportar uma situação</h1>
      <p class="text-muted-foreground text-base md:text-lg">Conta-nos o que aconteceu. Tudo é confidencial e seguro.</p>
    </div>
    <div class="bg-card border border-border/60 rounded-3xl p-6 md:p-10 shadow-sm animate-fade-up" style="animation-delay: 100ms;">
      <div class="space-y-6">
        <div>
          <label class="text-sm font-bold mb-2.5 block text-foreground">O que aconteceu?</label>
          <textarea id="description" placeholder="Descreve a situação com o máximo de detalhe possível..." rows="5" class="w-full bg-background border border-border rounded-2xl px-5 py-4 text-sm resize-none outline-none focus:ring-2 focus:ring-ring/50 transition-shadow leading-relaxed text-foreground"></textarea>
        </div>
        <div>
          <label class="text-sm font-bold mb-2.5 block text-foreground">Onde aconteceu?</label>
          <div class="relative">
            <button id="platformDropdownBtn" class="w-full bg-background border border-border rounded-2xl px-5 py-3.5 text-sm text-left flex items-center justify-between active:scale-[0.995] transition-transform text-foreground">
              <span id="selectedPlatform" class="text-muted-foreground">Seleciona a plataforma</span>
              <svg id="dropdownIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground transition-transform duration-200"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div id="platformDropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-card border border-border rounded-2xl shadow-xl z-10 overflow-hidden animate-scale-in"></div>
          </div>
        </div>
        <div>
          <label class="text-sm font-bold mb-2.5 block text-foreground">Provas (opcional)</label>
          <label class="flex items-center gap-4 bg-background border-2 border-dashed border-border rounded-2xl px-5 py-5 cursor-pointer hover:border-primary/30 active:scale-[0.995] transition-all group">
            <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center group-hover:bg-primary/15 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            </div>
            <div>
              <p class="text-sm font-bold text-foreground">Carregar imagens ou screenshots</p>
              <p class="text-xs text-muted-foreground mt-0.5">PNG, JPG até 10MB</p>
            </div>
            <input id="fileInput" type="file" multiple accept="image/*" class="hidden" />
          </label>
          <p id="fileCount" class="hidden text-xs text-primary font-semibold mt-2"></p>
        </div>
        <button id="submitBtn" disabled class="w-full flex items-center justify-center gap-2.5 bg-primary text-primary-foreground rounded-2xl px-6 py-4 font-bold text-base shadow-xl shadow-primary/20 hover:shadow-primary/30 active:scale-[0.97] transition-all duration-200 disabled:opacity-40 disabled:pointer-events-none cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Submeter denúncia
        </button>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
