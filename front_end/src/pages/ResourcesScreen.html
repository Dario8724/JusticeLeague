<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos de Apoio - SafeNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>

<body class="min-h-screen pt-20 pb-16 flex flex-col">
  <div id="main-navbar-container"></div>

  <main class="flex-grow-1">
    <section class="hero-gradient safenet-hero pt-32 pb-16 overflow-hidden">
      <div class="safenet-hero-blob safenet-hero-blob--a"></div>
      <div class="safenet-hero-blob safenet-hero-blob--b"></div>
      <div class="container px-4">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-10 animate-reveal">
            <div class="d-flex flex-column flex-lg-row align-items-start align-items-lg-end justify-content-between gap-4">
              <div>
                <div class="safenet-hero-badge mb-3">
                  <span class="d-inline-block w-2 h-2 rounded-full bg-primary"></span>
                  Recursos
                </div>
                <h1 class="safenet-hero-title mb-3 text-[#1e293b]">Recursos e contactos úteis</h1>
                <p class="safenet-hero-subtitle mb-0">Linhas de emergência, contactos da PSP e informação prática para te
                  ajudar a agir com segurança.</p>
              </div>
              <div class="d-flex flex-wrap gap-3">
                <a href="ResourcesScreen.html#help"
                  class="btn-modern d-inline-flex align-items-center gap-2 bg-primary text-white px-6 py-3 text-decoration-none shadow-lg shadow-primary/20">
                  Linha de ajuda
                  <span aria-hidden="true">↗</span>
                </a>
                <a href="ReportScreen.html"
                  class="btn-modern d-inline-flex align-items-center gap-2 bg-white text-dark border border-black/5 px-6 py-3 text-decoration-none shadow-sm">
                  Fazer denúncia
                  <span aria-hidden="true">↗</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="py-24">
      <div class="container mx-auto max-w-6xl px-4">
        <div id="resourcesGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
          <!-- Cards serão inseridos aqui via JavaScript -->
        </div>
      </div>
    </section>
  </main>

  <div id="main-footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
